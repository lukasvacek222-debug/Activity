<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity – Generátor slov</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&amp;family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --card-paint: #ff6b6b;
    --card-mime: #ffd166;
    --card-desc: #06d6a0;
    --accent: #fffffe;
    --text: #fffffe;
    --easy: #06d6a0;
    --medium: #ffd166;
    --hard: #ff9f1c;
    --expert: #ef476f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(255,107,107,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(6,214,160,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 30%, rgba(255,209,102,0.08) 0%, transparent 40%);
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.5rem, 8vw, 4rem);
    letter-spacing: 2px;
    background: linear-gradient(135deg, #ff6b6b, #ffd166, #06d6a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  header p {
    color: rgba(255,255,255,0.5);
    font-size: 0.95rem;
    margin-top: 6px;
  }

  /* Difficulty selector */
  .difficulty-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 36px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .diff-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    padding: 8px 20px;
    border: 2px solid transparent;
    border-radius: 50px;
    cursor: pointer;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.6);
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .diff-btn:hover { transform: translateY(-2px); color: #fff; }

  .diff-btn.active[data-d="1"] { background: var(--easy); color: #0f0e17; border-color: var(--easy); box-shadow: 0 0 20px rgba(6,214,160,0.4); }
  .diff-btn.active[data-d="2"] { background: var(--medium); color: #0f0e17; border-color: var(--medium); box-shadow: 0 0 20px rgba(255,209,102,0.4); }
  .diff-btn.active[data-d="3"] { background: var(--hard); color: #0f0e17; border-color: var(--hard); box-shadow: 0 0 20px rgba(255,159,28,0.4); }
  .diff-btn.active[data-d="4"] { background: var(--expert); color: #fff; border-color: var(--expert); box-shadow: 0 0 20px rgba(239,71,111,0.4); }

  /* Cards grid */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 1050px;
  }

  .card {
    border-radius: 24px;
    padding: 28px 24px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .card:hover { transform: translateY(-3px); }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    opacity: 0.12;
  }

  .card.paint { background: linear-gradient(145deg, rgba(255,107,107,0.18), rgba(255,107,107,0.05)); border: 1.5px solid rgba(255,107,107,0.35); }
  .card.mime  { background: linear-gradient(145deg, rgba(255,209,102,0.18), rgba(255,209,102,0.05)); border: 1.5px solid rgba(255,209,102,0.35); }
  .card.desc  { background: linear-gradient(145deg, rgba(6,214,160,0.18), rgba(6,214,160,0.05)); border: 1.5px solid rgba(6,214,160,0.35); }

  .card-icon {
    font-size: 2.8rem;
    line-height: 1;
  }

  .card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    letter-spacing: 1px;
  }

  .card.paint .card-title { color: #ff8e8e; }
  .card.mime  .card-title { color: #ffd166; }
  .card.desc  .card-title { color: #06d6a0; }

  .word-display {
    min-height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 100%;
  }

  .word {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    line-height: 1.2;
    color: #fff;
    transition: all 0.3s;
    word-break: break-word;
  }

  .word.animating {
    animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .word-hint {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.35);
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  .diff-badge {
    font-size: 0.7rem;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card.paint .diff-badge { background: rgba(255,107,107,0.2); color: #ff8e8e; }
  .card.mime  .diff-badge { background: rgba(255,209,102,0.2); color: #ffd166; }
  .card.desc  .diff-badge { background: rgba(6,214,160,0.2); color: #06d6a0; }

  .gen-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    letter-spacing: 1px;
    padding: 13px 32px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    position: relative;
    overflow: hidden;
  }

  .gen-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }

  .gen-btn:hover::after { background: rgba(255,255,255,0.15); }
  .gen-btn:active { transform: scale(0.97); }

  .card.paint .gen-btn { background: linear-gradient(135deg, #ff6b6b, #ff4d4d); color: #fff; box-shadow: 0 4px 20px rgba(255,107,107,0.4); }
  .card.mime  .gen-btn { background: linear-gradient(135deg, #ffd166, #ffb800); color: #0f0e17; box-shadow: 0 4px 20px rgba(255,209,102,0.4); }
  .card.desc  .gen-btn { background: linear-gradient(135deg, #06d6a0, #00b887); color: #0f0e17; box-shadow: 0 4px 20px rgba(6,214,160,0.4); }

  .counter {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.25);
    margin-top: -8px;
  }

  footer {
    margin-top: 48px;
    color: rgba(255,255,255,0.2);
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>🎉 Activity</h1>
  <p>Generátor slov pro vaši hru</p>
</header>

<div class="difficulty-bar">
  <button class="diff-btn active" data-d="1">🟢 Lehká</button>
  <button class="diff-btn" data-d="2">🟡 Střední</button>
  <button class="diff-btn" data-d="3">🟠 Těžká</button>
  <button class="diff-btn" data-d="4">🔴 Expert</button>
</div>

<div class="cards">
  <!-- MALOVÁNÍ -->
  <div class="card paint">
    <div class="card-icon">🎨</div>
    <div class="card-title">Malování</div>
    <span class="diff-badge" id="badge-paint">Lehká</span>
    <div class="word-display">
      <div class="word" id="word-paint">Stiskni tlačítko!</div>
      <div class="word-hint" id="hint-paint"></div>
    </div>
    <button class="gen-btn" onclick="generate('paint')">✏️ Nové slovo</button>
    <div class="counter" id="count-paint"></div>
  </div>

  <!-- PANTOMIMA -->
  <div class="card mime">
    <div class="card-icon">🕺</div>
    <div class="card-title">Pantomima</div>
    <span class="diff-badge" id="badge-mime">Lehká</span>
    <div class="word-display">
      <div class="word" id="word-mime">Stiskni tlačítko!</div>
      <div class="word-hint" id="hint-mime"></div>
    </div>
    <button class="gen-btn" onclick="generate('mime')">🤸 Nové slovo</button>
    <div class="counter" id="count-mime"></div>
  </div>

  <!-- POPIS SLOVEM -->
  <div class="card desc">
    <div class="card-icon">💬</div>
    <div class="card-title">Popis slovem</div>
    <span class="diff-badge" id="badge-desc">Lehká</span>
    <div class="word-display">
      <div class="word" id="word-desc">Stiskni tlačítko!</div>
      <div class="word-hint" id="hint-desc"></div>
    </div>
    <button class="gen-btn" onclick="generate('desc')">🗣️ Nové slovo</button>
    <div class="counter" id="count-desc"></div>
  </div>
</div>

<footer>
  Každá kategorie má 500+ slov ve 4 úrovních obtížnosti
  <br><br>
  <button onclick="downloadApp()" style="font-family: &quot;Fredoka One&quot;, cursive; font-size: 1rem; padding: 12px 28px; border-radius: 50px; border: 2px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.15); color: rgb(255, 255, 255); cursor: pointer; letter-spacing: 1px; transition: 0.2s; transform: translateY(-2px);" onmouseover="this.style.background='rgba(255,255,255,0.15)';this.style.color='#fff';this.style.transform='translateY(-2px)'" onmouseout="this.style.background='rgba(255,255,255,0.07)';this.style.color='rgba(255,255,255,0.7)';this.style.transform='translateY(0)'">
    ⬇️ Stáhnout aplikaci
  </button>
</footer>

<script>
function downloadApp() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'activity-hra.html';
  a.click();
  URL.revokeObjectURL(url);
}
</script>

// State
let currentDiff = 1;
const usedWords = { paint: new Set(), mime: new Set(), desc: new Set() };
const lastWord = { paint: '', mime: '', desc: '' };

const DIFF_NAMES = { 1: 'Lehká', 2: 'Střední', 3: 'Těžká', 4: 'Expert' };

function pickRandom(category) {
  const pool = WORDS[category][currentDiff];
  const available = pool.filter(w => !usedWords[category].has(w));
  if (available.length === 0) {
    usedWords[category].clear();
    return pickRandom(category);
  }
  const word = available[Math.floor(Math.random() * available.length)];
  usedWords[category].add(word);
  return word;
}

function generate(cat) {
  const word = pickRandom(cat);
  lastWord[cat] = word;

  const el = document.getElementById('word-' + cat);
  el.classList.remove('animating');
  void el.offsetWidth;
  el.textContent = word;
  el.classList.add('animating');

  // Update counter
  const pool = WORDS[cat][currentDiff];
  const used = usedWords[cat].size;
  document.getElementById('count-' + cat).textContent = `Zobrazeno: ${used} / ${pool.length}`;
}

function setDifficulty(d) {
  currentDiff = d;
  usedWords.paint.clear();
  usedWords.mime.clear();
  usedWords.desc.clear();

  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.diff-btn[data-d="${d}"]`).classList.add('active');

  const name = DIFF_NAMES[d];
  document.getElementById('badge-paint').textContent = name;
  document.getElementById('badge-mime').textContent = name;
  document.getElementById('badge-desc').textContent = name;

  // Reset words display
  ['paint','mime','desc'].forEach(cat => {
    document.getElementById('word-' + cat).textContent = 'Stiskni tlačítko!';
    document.getElementById('hint-' + cat).textContent = '';
    document.getElementById('count-' + cat).textContent = '';
  });
}

// Init difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => setDifficulty(parseInt(btn.dataset.d)));
});
